name: Tender Alert Monitor

on:
  schedule:
     - cron: '0 * * * *'    # Every 1 hour

  # This button lets you run it MANUALLY anytime from GitHub website
  workflow_dispatch:

jobs:
  run-tender-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pytz

      - name: Run Tender Monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python main.py

      - name: Save seen-tenders database (so no duplicates next run)
        uses: actions/cache@v4
        with:
          path: tenders.db
          key: tenders-db-${{ github.run_id }}
          restore-keys: |
            tenders-db-
